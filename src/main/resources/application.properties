spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/car_rental_db?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

jwt.secret=${JWT_SECRET:carRentalSecretKey2024SuperSecureKeyForJWTTokenGeneration}
jwt.expiration=${JWT_EXPIRATION:86400000}

server.port=8081
spring.application.name=car-rental