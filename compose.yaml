services:
  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: car_rental_db
    ports:
      - "3307:3306"

  app:
    build: .
    depends_on:
      - db
    environment:
      DB_URL: jdbc:mysql://db:3306/car_rental_db
      DB_USERNAME: root
      DB_PASSWORD: admin
    ports:
      - "8081:8081"